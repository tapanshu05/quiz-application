<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Quiz System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm p-4">
                    <h3 class="text-center mb-4">🔐 Student Login</h3>
                    <form method="POST" id="loginForm">
                        {% csrf_token %}
                        {{ form.as_p }}
                        
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="showPassword">
                            <label class="form-check-input-label" for="showPassword">
                                Show Password
                            </label>
                        </div>

                        <button type="submit" class="btn btn-warning w-100 fw-bold text-dark">Login</button>
                    </form>
                    <p class="text-center mt-3">New Student? <a href="{% url 'register' %}">Register here</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('showPassword').addEventListener('change', function() {
            // Django के इन-बिल्ट फॉर्म में पासवर्ड इनपुट का टाइप 'password' होता है
            const passwordFields = document.querySelectorAll('input[type="password"], input.password-toggle');
            passwordFields.forEach(field => {
                if (this.checked) {
                    field.type = 'text';
                    field.classList.add('password-toggle'); // ट्रैक रखने के लिए कि यह पासवर्ड फील्ड थी
                } else {
                    field.type = 'password';
                }
            });
        });
    </script>
</body>
</html>
