{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quiz System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
       body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    
    /* 📚 साफ़ और सुंदर एजुकेशनल स्केच बैकग्राउंड */
    background-image: linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85)), 
                      url("https://images.unsplash.com/photo-1513258496099-48168024aec0?q=80&w=1920&auto=format&fit=crop");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}
        .quiz-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }
        .quiz-card:hover {
            transform: translateY(-5px);
        }
        .btn-custom {
            background: linear-gradient(135deg, #ff9966 0%, #ff5e62 100%);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s ease;
        }
        .btn-custom:hover {
            background: linear-gradient(135deg, #ff5e62 0%, #ff9966 100%);
            box-shadow: 0 5px 15px rgba(255, 94, 98, 0.4);
            color: white;
        }
        /* जांगो के फॉर्म इनपुट्स को सुंदर बनाने के लिए */
        form p input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.3s ease;
        }
        form p input:focus {
            border-color: #764ba2;
        }
        form p label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #4a5568;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 px-4">
                <div class="card quiz-card p-4 p-md-5">
                    <h3 class="text-center mb-4 fw-bold text-dark" style="letter-spacing: 1px;">🔐 Student Login</h3>
                    <form method="POST" id="loginForm">
                        {% csrf_token %}
                        {{ form.as_p }}
                        
                        <!-- Show Password Checkbox -->
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="showPassword">
                            <label class="form-check-label fw-semibold text-secondary" for="showPassword">
                                Show Password
                            </label>
                        </div>

                        <button type="submit" class="btn btn-custom w-100 text-uppercase tracking-wider">Login</button>
                    </form>
                    <div class="text-center mt-3">
    <a href="{% provider_login_url 'google' %}" class="btn btn-outline-danger w-100">
        Sign in with Google
    </a>
</div>
                    <p class="text-center mt-4 mb-0 text-muted">New Student? <a href="{% url 'register' %}" class="text-decoration-none fw-bold" style="color: #764ba2;">Register here</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('showPassword').addEventListener('change', function() {
            const passwordFields = document.querySelectorAll('input[type="password"], input.password-toggle');
            passwordFields.forEach(field => {
                if (this.checked) {
                    field.type = 'text';
                    field.classList.add('password-toggle');
                } else {
                    field.type = 'password';
                }
            });
        });
    </script>
</body>
</html>
