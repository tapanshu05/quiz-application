<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container text-center py-5">
        <div class="card shadow-sm p-5 mx-auto" style="max-width: 500px; border-radius: 16px; margin-top: 5%;">
            <h3 class="fw-bold mb-3">Confirm Premium Access</h3>
            <p class="text-muted">Unlock lifetime access to all Quizzes, Handwritten Solutions, and Premium PDFs.</p>
            <h2 class="text-primary fw-bold mb-4">₹59.00</h2>
            <button id="pay-btn" class="btn btn-success btn-lg w-100 fw-bold py-3 rounded-pill shadow">Proceed to Pay</button>
        </div>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        var options = {
            "key": "{{ razorpay_key_id }}",
            "amount": "{{ amount }}",
            "currency": "INR",
            "name": "Exam Prep Portal",
            "description": "Lifetime Premium Access",
            "order_id": "{{ order_id }}",
            "callback_url": "https://exampreperation.online/payment/success/",
            "handler": function (response){
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = '/payment/success/';
                
                var fields = {
                    'razorpay_payment_id': response.razorpay_payment_id,
                    'razorpay_order_id': response.razorpay_order_id,
                    'razorpay_signature': response.razorpay_signature
                };
                
                for (var key in fields) {
                    var input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = fields[key];
                    form.appendChild(input);
                }
                document.body.appendChild(form);
                form.submit();
            },
            "prefill": {
                "name": "{{ user.username }}"
            },
            "theme": { "color": "#5b73df" }
        };
        var rzp1 = new Razorpay(options);
        document.getElementById('pay-btn').onclick = function(e){
            rzp1.open();
            e.preventDefault();
        }
    </script>
</body>
</html>
