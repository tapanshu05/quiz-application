<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - Premium Access</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: #f4f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .checkout-container {
            max-width: 500px;
            margin: 30px auto;
        }

        .checkout-card {
            background: white;
            border: none;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            padding: 40px 30px;
            position: relative;
            overflow: hidden;
        }

        /* Top decorative tech grid bar */
        .checkout-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
        }

        .premium-shield {
            width: 70px;
            height: 70px;
            background: #eef2ff;
            color: #4f46e5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
        }

        .price-tag {
            font-size: 3rem;
            font-weight: 800;
            color: #1e293b;
            margin: 20px 0;
        }

        .price-tag span {
            font-size: 1.2rem;
            color: #64748b;
            font-weight: 500;
        }

        /* Feature List Styling */
        .feature-item {
            display: flex;
            align-items: center;
            text-align: left;
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 10px;
            border: 1px solid #f1f5f9;
        }

        .feature-icon {
            color: #10b981;
            margin-right: 12px;
            font-size: 1.1rem;
        }

        /* Razorpay Custom Button */
        .btn-pay {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            transition: all 0.2s ease;
            margin-top: 20px;
        }

        .btn-pay:hover {
            background: linear-gradient(135deg, #3730a3 0%, #4f46e5 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
        }

        /* Trust Badges */
        .security-footer {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed #e2e8f0;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container checkout-container">
        <div class="card checkout-card text-center">
            
            <div class="premium-shield">
                <i class="fa-solid fa-shield-halved"></i>
            </div>

            <h3 class="fw-bold text-dark mb-1">Confirm Premium Access</h3>
            <p class="text-muted small px-2">Unlock the complete examination pack and accelerate your learning journey instantly.</p>

            <div class="price-tag">
                ₹59<span class="ms-1">/ lifetime</span>
            </div>

            <div class="mt-2">
                <div class="feature-item">
                    <i class="fa-solid fa-circle-check feature-icon"></i>
                    <span class="small fw-medium text-secondary">Unlimited Access to All Live Quizzes</span>
                </div>
                <div class="feature-item">
                    <i class="fa-solid fa-circle-check feature-icon"></i>
                    <span class="small fw-medium text-secondary">Detailed Handwritten Solutions</span>
                </div>
                <div class="feature-item">
                    <i class="fa-solid fa-circle-check feature-icon"></i>
                    <span class="small fw-medium text-secondary">Premium Revision Notes & PDFs</span>
                </div>
                <div class="feature-item">
                    <i class="fa-solid fa-circle-check feature-icon"></i>
                    <span class="small fw-medium text-secondary">Performance Analytics Dashboard</span>
                </div>
            </div>

            <button id="rzp-button1" class="btn btn-pay">
                <i class="fa-solid fa-lock me-2"></i> Proceed to Pay Securely
            </button>

            <div class="security-footer d-flex justify-content-center align-items-center gap-3">
                <span><i class="fa-solid fa-circle-nodes text-primary me-1"></i> Razorpay Secure</span>
                <span>•</span>
                <span><i class="fa-solid fa-lock text-success me-1"></i> 256-Bit SSL Encryption</span>
            </div>

        </div>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        var options = {
            "key": "{{ razorpay_key_id }}",
            "amount": "{{ amount }}",
            "currency": "INR",
            "name": "Exam Preparation Online",
            "description": "Lifetime Premium Access Membership",
            "order_id": "{{ order_id }}",
            
            // 💡 यही वो जादू की लाइन है जो ऑटोमैटिक ताला खोलती है!
            "callback_url": "https://exampreperation.online/payment/success/",
            
            "prefill": {
                "name": "{{ user.username }}",
                "email": "{{ user.email }}"
            },
            "theme": {
                "color": "#4f46e5"
            }
        };
        
        var rzp1 = new Razorpay(options);
        document.getElementById('rzp-button1').onclick = function(e){
            rzp1.open();
            e.preventDefault();
        }
    </script>
</body>
</html>
