<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ quiz.title }} - Live Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Disable text selection across the quiz layout */
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        .sticky-timer { position: sticky; top: 10px; z-index: 1000; }
    </style>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        }
      };
    </script>
    
    
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/input/mml-chtml.js"></script><script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        }
      };
    </script>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/input/mml-chtml.js"></script>
</head>
<body class="bg-light">

    <div class="container my-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <div class="card bg-dark text-white shadow sticky-timer mb-4">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <h4 class="mb-0 text-warning fw-bold">{{ quiz.title }}</h4>
                        <h4 class="mb-0">Time Left: <span id="timer" class="badge bg-danger">00:00</span></h4>
                    </div>
                </div>

                <form id="quizForm" method="POST" action="{% url 'submit_quiz' quiz.id %}">
                    {% csrf_token %}
                    
                    <!-- क्वेश्चन लूप -->
                    {% for q in questions %}
                    <!-- यहाँ हमने 'question-card' क्लास और यूनिक ID जोड़ दी है, शुरू में सब छुपे रहेंगे -->
                    <div class="card shadow-sm mb-4 question-card" id="q-{{ forloop.counter }}" style="display: none;">
                        <div class="card-body">
                            <h5 class="card-title mb-3"><strong>Q{{ forloop.counter }}:</strong> {{ q.question_text }}</h5>
                            
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="A" id="q_{{ q.id }}_A">
                                <label class="form-check-input-label" for="q_{{ q.id }}_A">{{ q.option_a }}</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="B" id="q_{{ q.id }}_B">
                                <label class="form-check-input-label" for="q_{{ q.id }}_B">{{ q.option_b }}</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="C" id="q_{{ q.id }}_C">
                                <label class="form-check-input-label" for="q_{{ q.id }}_C">{{ q.option_c }}</label>
                            </div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="D" id="q_{{ q.id }}_D">
                                <label class="form-check-input-label" for="q_{{ q.id }}_D">{{ q.option_d }}</label>
                            </div>
                        </div>
                    </div>
                    {% endfor %}

                    <!-- 🛠️ नया बटन कंट्रोल सेक्शन (Previous, Next और Submit) -->
                    <div class="d-flex justify-content-between align-items-center mb-5">
                        <button type="button" id="prev-btn" class="btn btn-secondary btn-lg px-4 shadow" onclick="changeQuestion(-1)">← Previous</button>
                        <button type="button" id="next-btn" class="btn btn-primary btn-lg px-4 shadow" onclick="changeQuestion(1)">Next →</button>
                        <button type="submit" id="submit-btn" class="btn btn-success btn-lg px-5 shadow" style="display: none;">Submit Quiz</button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script>
        // 🌟 नए क्वेश्चन पेजिनेशन का जादू
        let currentQuestion = 1;
        const totalQuestions = document.querySelectorAll('.question-card').length;

        function showQuestion(n) {
            // सारे क्वेश्चन छुपाओ
            document.querySelectorAll('.question-card').forEach(card => card.style.display = 'none');
            
            // सिर्फ वर्तमान क्वेश्चन दिखाओ
            const currentCard = document.getElementById(`q-${n}`);
            if(currentCard) currentCard.style.display = 'block';

            // पहले पेज पर Previous बटन छुपाओ
            document.getElementById('prev-btn').style.visibility = n === 1 ? 'hidden' : 'visible';

            // आखिरी पेज पर Next हटाकर Submit बटन दिखाओ
            if (n === totalQuestions) {
                document.getElementById('next-btn').style.display = 'none';
                document.getElementById('submit-btn').style.display = 'inline-block';
            } else {
                document.getElementById('next-btn').style.display = 'inline-block';
                document.getElementById('submit-btn').style.display = 'none';
            }
        }

        function changeQuestion(step) {
            currentQuestion += step;
            if (currentQuestion < 1) currentQuestion = 1;
            if (currentQuestion > totalQuestions) currentQuestion = totalQuestions;
            showQuestion(currentQuestion);
            
            // नया क्वेश्चन आने पर स्क्रीन को थोड़ा ऊपर स्क्रॉल कर देगा ताकि क्वेश्चन साफ़ दिखे
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // पेज लोड होते ही पहला क्वेश्चन चालू करो
        document.addEventListener("DOMContentLoaded", function() {
            showQuestion(1);
        });


        // 1. COUNTDOWN TIMER LOGIC (तुम्हारा पुराना टाइमर कोड)
        let timeLimitInMinutes = parseInt("{{ quiz.time_limit }}");
        let totalTimeInSeconds = timeLimitInMinutes * 60;
        const timerElement = document.getElementById('timer');

        const countdown = setInterval(() => {
            let minutes = Math.floor(totalTimeInSeconds / 60);
            let seconds = totalTimeInSeconds % 60;

            seconds = seconds < 10 ? '0' + seconds : seconds;
            minutes = minutes < 10 ? '0' + minutes : minutes;

            timerElement.textContent = `${minutes}:${seconds}`;

            if (totalTimeInSeconds <= 0) {
                clearInterval(countdown);
                alert("Time is up! Your quiz will be submitted automatically.");
                document.getElementById('quizForm').submit();
            }
            totalTimeInSeconds--;
        }, 1000);

        // 2. ANTI-CHEAT: BLOCK COPY/PASTE & RIGHT CLICK (तुम्हारा पुराना एंटी-चीट)
        document.addEventListener('contextmenu', event => event.preventDefault()); 
        document.addEventListener('copy', event => event.preventDefault());        
        document.addEventListener('paste', event => event.preventDefault());       

        // 3. ANTI-CHEAT: DETECT TAB SWITCHING (तुम्हारा पुराना टैब स्विच ट्रैकर)
        let warningCount = 0;
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                warningCount++;
                if (warningCount >= 2) {
                    alert("You switched tabs twice! Your quiz is being auto-submitted due to a violation.");
                    document.getElementById('quizForm').submit();
                } else {
                    alert("⚠️ WARNING: Tab switching is strictly prohibited! Next time your test will auto-submit.");
                }
            }
        });
    </script>
</body>
</html>
