<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ quiz.title }} - Live Exam</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- MathJax Setup (LaTeX के लिए) -->
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)'], ['\\\\(', '\\\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]'], ['\\\\[', '\\\\]']],
          processEscapes: true
        },
        options: {
          processHtmlClass: 'tex2jax_process'
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js"></script>

    <style>
        body {
            background: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        .exam-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 15px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .exam-title {
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .timer-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 1.2rem;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .quiz-container {
            margin-top: 40px;
            margin-bottom: 60px;
        }
        .question-card {
            background: white;
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 30px;
        }
        .q-number {
            background: #eef2f7;
            color: #1e3c72;
            font-size: 0.9rem;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }
        .question-text {
            font-size: 1.25rem;
            color: #2d3748;
            line-height: 1.6;
        }
        .option-label {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.05rem;
            color: #4a5568;
            width: 100%;
        }
        .option-label:hover {
            background: #edf2f7;
            border-color: #cbd5e0;
        }
        .option-input {
            margin-right: 15px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .btn-nav {
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
        }
        .btn-prev {
            background-color: #edf2f7;
            color: #4a5568;
            border: 1px solid #cbd5e0;
        }
        .btn-next {
            background: #3182ce;
            color: white;
            border: none;
        }
        .btn-submit {
            background: #38a169;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="exam-header sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <i class="fa-solid fa-graduation-cap me-3 fa-xl text-warning"></i>
                <h1 class="exam-title fw-bold mb-0 text-capitalize">{{ quiz.title }} Test</h1>
            </div>
            <div class="timer-box fw-bold">
                <i class="fa-regular fa-clock me-2 text-warning"></i> Time Left: <span id="timer">10:00</span>
            </div>
        </div>
    </header>

    <!-- Quiz Container -->
    <div class="container quiz-container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <form id="quizForm" method="POST" action="{% url 'submit_quiz' quiz.id %}">
                    {% csrf_token %}
                    
                    {% for q in questions %}
                    <!-- 💡 सीधे जांगो से ही पक्का किया कि पहला सवाल दिखेगा (block) और बाकी छिपे रहेंगे (none) -->
                    <div class="card question-card mb-4 question-block tex2jax_process" 
                         id="q-block-{{ forloop.index }}" 
                         style="display: {% if forloop.first %}block{% else %}none{% endif %};">
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <span class="q-number fw-semibold">Question {{ forloop.index }} of {{ questions|length }}</span>
                            <span class="badge bg-success-subtle text-success border border-success-subtle px-3 py-2 rounded-pill">Marks: +1</span>
                        </div>

                        <div class="question-text fw-medium mb-4">
                            {{ q.question_text }}
                        </div>

                        <div class="option-wrapper">
                            <label class="option-label">
                                <input type="radio" name="question_{{ q.id }}" value="A" class="option-input">
                                <span class="option-text-span">{{ q.option_a }}</span>
                            </label>

                            <label class="option-label">
                                <input type="radio" name="question_{{ q.id }}" value="B" class="option-input">
                                <span class="option-text-span">{{ q.option_b }}</span>
                            </label>

                            <label class="option-label">
                                <input type="radio" name="question_{{ q.id }}" value="C" class="option-input">
                                <span class="option-text-span">{{ q.option_c }}</span>
                            </label>

                            <label class="option-label">
                                <input type="radio" name="question_{{ q.id }}" value="D" class="option-input">
                                <span class="option-text-span">{{ q.option_d }}</span>
                            </label>
                        </div>
                    </div>
                    {% empty %}
                    <div class="card question-card text-center">
                        <p class="text-muted my-4">No questions available in this quiz.</p>
                    </div>
                    {% endfor %}

                    <!-- Controls -->
                    <div class="d-flex justify-content-between align-items-center mt-4">
                        <button type="button" class="btn btn-nav btn-prev" id="prevBtn" onclick="changeQuestion(-1)" disabled>
                            <i class="fa-solid fa-arrow-left me-2"></i> Previous
                        </button>
                        
                        <button type="button" class="btn btn-nav btn-next" id="nextBtn" onclick="changeQuestion(1)">
                            Next <i class="fa-solid fa-arrow-right ms-2"></i>
                        </button>

                        <button type="submit" class="btn btn-nav btn-submit d-none" id="submitBtn">
                            Submit Exam <i class="fa-solid fa-check-double ms-2"></i>
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <!-- Script Blocks -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentIdx = 1;
        let totalQuestions = 1;

        // 🌟 जैसे ही पेज लोड हो, सबसे पहले सवाल को ज़बरदस्ती ढूंढो
        document.addEventListener("DOMContentLoaded", function() {
            const blocks = document.querySelectorAll('.question-block');
            totalQuestions = blocks.length || 1;
            
            console.log("Total questions found: " + totalQuestions);

            // 1. ज़बरदस्ती पक्का करो कि केवल पहला सवाल (Index 1) खुलेगा, बाकी सब पूरी तरह बंद!
            blocks.forEach((block, index) => {
                if (index === 0) {
                    block.style.setProperty('display', 'block', 'important');
                    // आईडी को भी री-सेट कर देते हैं ताकि जावास्क्रिप्ट कभी कन्फ्यूज न हो
                    block.id = "q-block-1";
                } else {
                    block.style.setProperty('display', 'none', 'important');
                    block.id = `q-block-${index + 1}`;
                }

                // टॉप काउंटर को जबरदस्ती फिक्स करो (जैसे: Question 1 of 3)
                const qNumSpan = block.querySelector('.q-number');
                if (qNumSpan) {
                    qNumSpan.textContent = `Question ${index + 1} of ${totalQuestions}`;
                }
            });

            // बटन को शुरूआती पोजीशन पर सेट करो
            updateButtonStates(1);
        });

        function showQuestion(idx) {
            // सारे ब्लॉक्स छुपाओ
            document.querySelectorAll('.question-block').forEach(block => {
                block.style.setProperty('display', 'none', 'important');
            });
            
            // सिर्फ टारगेट ब्लॉक दिखाओ
            const targetBlock = document.getElementById(`q-block-${idx}`);
            if (targetBlock) {
                targetBlock.style.setProperty('display', 'block', 'important');
            }

            updateButtonStates(idx);

            // MathJax दोबारा रेंडर करें
            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetPromise();
            }
        }

        function updateButtonStates(idx) {
            // Previous बटन कंट्रोल
            document.getElementById('prevBtn').disabled = (idx === 1);

            // Next / Submit बटन कंट्रोल
            if (idx >= totalQuestions) {
                document.getElementById('nextBtn').classList.add('d-none');
                document.getElementById('submitBtn').classList.remove('d-none');
            } else {
                document.getElementById('nextBtn').classList.remove('d-none');
                document.getElementById('submitBtn').classList.add('d-none');
            }
        }

        function changeQuestion(step) {
            currentIdx += step;
            // बाउंड्री चेक ताकि इंडेक्स बाहर न भागे
            if (currentIdx < 1) currentIdx = 1;
            if (currentIdx > totalQuestions) currentIdx = totalQuestions;
            
            showQuestion(currentIdx);
        }

        // ⏱️ 10 मिनट का लाइव टाइमर
        let timeRemaining = 600; 
        const timerElement = document.getElementById('timer');
        const countdown = setInterval(() => {
            let minutes = Math.floor(timeRemaining / 60);
            let seconds = timeRemaining % 60;
            if (timerElement) {
                timerElement.textContent = `${minutes < 10 ? '0'+minutes : minutes}:${seconds < 10 ? '0'+seconds : seconds}`;
            }
            if (timeRemaining <= 0) {
                clearInterval(countdown);
                document.getElementById('quizForm').submit();
            }
            timeRemaining--;
        }, 1000);
    </script>
</body>
</html>
