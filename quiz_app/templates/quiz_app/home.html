<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controlled Quiz Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark shadow mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="#">⚡ Fully Controlled Quiz System</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 class="mb-4 fw-bold text-secondary">Available Quizzes</h2>
                
                {% for quiz in quizzes %}
                <div class="card shadow-sm mb-3">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h4 class="card-title mb-1 text-dark">{{ quiz.title }}</h4>
                            <p class="text-muted mb-0">⏱️ Time Limit: <strong>{{ quiz.time_limit }} minutes</strong></p>
                        </div>
                        <a href="{% url 'start_quiz' quiz.id %}" class="btn btn-warning fw-bold">Start Quiz</a>
                    </div>
                </div>
                {% empty %}
                <div class="alert alert-info">No quizzes available at the moment. Check back later!</div>
                {% endfor %}
                
            </div>
        </div>
    </div>
</body>
</html>
