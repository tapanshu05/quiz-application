<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result - {{ quiz.title }}</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Animate.css for beautiful appearance -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body {
            background: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .result-container {
            max-width: 580px;
            margin: 30px auto;
        }

        .result-card {
            background: white;
            border: none;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            padding: 40px 30px;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Top decorative gradient bar */
        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, #38a169 0%, #3182ce 100%);
        }

        .celebration-icon {
            font-size: 4.5rem;
            color: #38a169;
            margin-bottom: 15px;
            display: inline-block;
        }

        .quiz-title {
            color: #718096;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* Premium Score Display Sphere */
        .score-badge-wrapper {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: #f0fff4;
            border: 4px dashed #38a169;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 30px auto;
            transition: all 0.3s ease;
        }

        .score-badge-wrapper:hover {
            transform: scale(1.05);
            background: #e6fffa;
        }

        .score-number {
            font-size: 3.5rem;
            font-weight: 800;
            color: #276749;
            line-height: 1;
        }

        .total-number {
            font-size: 1.2rem;
            color: #4a5568;
            font-weight: 500;
            border-top: 2px solid #cbd5e0;
            margin-top: 5px;
            padding-top: 5px;
            width: 60px;
        }

        .feedback-text {
            font-size: 1.4rem;
            color: #2d3748;
            font-weight: 700;
            margin-bottom: 25px;
        }

        /* Custom Modern Dashboard Button */
        .btn-dashboard {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.05rem;
            box-shadow: 0 5px 15px rgba(33, 147, 176, 0.3);
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            width: 100%;
        }

        .btn-dashboard:hover {
            background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(33, 147, 176, 0.4);
        }
    </style>
</head>
<body>

    <div class="container result-container">
        <div class="card result-card animate__animated animate__zoomIn">
            
            <!-- Animated Celebration Icon -->
            <div class="celebration-icon animate__animated animate__tada animate__infinite animate__slower">
                <i class="fa-solid fa-trophy text-warning"></i>
            </div>

            <h2 class="fw-bold text-success mb-1">Quiz Completed!</h2>
            <p class="quiz-title mb-4"><i class="fa-solid fa-book-open me-2"></i>{{ quiz.title }}</p>

            <!-- Circular Score Engine Block -->
            <div class="score-badge-wrapper">
                <span class="score-number">{{ score }}</span>
                <span class="total-number">/ {{ total }}</span>
            </div>

            <!-- Dynamic Feedback message based on score -->
            <div class="feedback-text">
                {% if score == total %}
                    🌟 Brilliant! Perfect Score!
                {% elif score >= total|divisibleby:2 %}
                    👍 Good Job! Keep It Up!
                {% else %}
                    📚 Need Practice! Try Again!
                {% endif %}
            </div>

            <div class="row g-2 justify-content-center">
                <div class="col-12">
                    <!-- Action redirect button -->
                    <a href="{% url 'dashboard' %}" class="btn btn-dashboard">
                        <i class="fa-solid fa-house-user me-2"></i> Back to Dashboard
                    </a>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
