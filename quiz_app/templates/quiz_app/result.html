<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Scorecard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="card shadow p-4">
                    <h1 class="text-success fw-bold mb-3">🎉 Quiz Completed!</h1>
                    <h3 class="text-dark mb-4">Quiz: {{ quiz.title }}</h3>
                    
                    <div class="bg-light p-4 rounded-3 mb-4">
                        <p class="fs-4 mb-1">Your Score</p>
                        <h2 class="display-4 fw-bold text-primary">{{ score }} / {{ total_questions }}</h2>
                    </div>

                    <a href="{% url 'home' %}" class="btn btn-outline-dark btn-lg w-100">Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
