<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Quiz System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm p-4">
                    <h3 class="text-center mb-4">📝 Student Registration</h3>
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="showPasswordReg">
                            <label class="form-check-input-label" for="showPasswordReg">
                                Show Passwords
                            </label>
                        </div>

                        <button type="submit" class="btn btn-warning w-100 fw-bold text-dark">Register</button>
                    </form>
                    <p class="text-center mt-3">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('showPasswordReg').addEventListener('change', function() {
            const passwordFields = document.querySelectorAll('input[type="password"], input.password-toggle');
            passwordFields.forEach(field => {
                if (this.checked) {
                    field.type = 'text';
                    field.classList.add('password-toggle');
                } else {
                    field.type = 'password';
                }
            });
        });
    </script>
</body>
</html>
