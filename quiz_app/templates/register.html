<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Quiz System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 0;
        }
        .quiz-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }
        .quiz-card:hover {
            transform: translateY(-5px);
        }
        .btn-custom {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s ease;
        }
        .btn-custom:hover {
            background: linear-gradient(135deg, #38ef7d 0%, #11998e 100%);
            box-shadow: 0 5px 15px rgba(56, 239, 125, 0.4);
            color: white;
        }
        /* जांगो फॉर्म के इनपुट्स */
        form p input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.3s ease;
        }
        form p input:focus {
            border-color: #764ba2;
        }
        form p label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #4a5568;
        }
        /* जांगो की हेल्प टेक्स्ट (जैसे पासवर्ड रूल्स) को छोटा और साफ़ रखने के लिए */
        .helptext {
            display: block;
            font-size: 11px;
            color: #718096;
            margin-bottom: 10px;
            line-height: 1.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 px-4">
                <div class="card quiz-card p-4 p-md-5">
                    <h3 class="text-center mb-4 fw-bold text-dark" style="letter-spacing: 1px;">📝 Student Registration</h3>
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        
                        <!-- Show Password Checkbox -->
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="showPasswordReg">
                            <label class="form-check-label fw-semibold text-secondary" for="showPasswordReg">
                                Show Passwords
                            </label>
                        </div>

                        <button type="submit" class="btn btn-custom w-100 text-uppercase tracking-wider">Register</button>
                    </form>
                    <p class="text-center mt-4 mb-0 text-muted">Already have an account? <a href="{% url 'login' %}" class="text-decoration-none fw-bold" style="color: #764ba2;">Login here</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('showPasswordReg').addEventListener('change', function() {
            const passwordFields = document.querySelectorAll('input[type="password"], input.password-toggle');
            passwordFields.forEach(field => {
                if (this.checked) {
                    field.type = 'text';
                    field.classList.add('password-toggle');
                } else {
                    field.type = 'password';
                }
            });
        });
    </script>
</body>
</html>
